# Echobees Java Spring Boot + MySql Environment settings
spring.application.name=hrms

# MySQL Database Connection details
spring.datasource.url=jdbc:mysql://localhost:3306/echobees_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate configurations for Automated Schema design setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# API port setting
server.port=8080
